name: chat_expert
description: 简单对话处理（闲聊、问候、简单问答）。当用户请求无需工具/技能/知识库时使用。
version: "1.0.0"

expert:
  category: chat
  icon: 💬
  label: 对话 Agent
  priority: 50

routing:
  target_format: ""
  target_prefix: ""
  aliases:
    system: chat
  default_fallback: true

intents:
  dynamic: false
  static:
    - intent_type: general_chat
      description: "通用对话，处理闲聊、问候、感谢等日常对话"
      target: "chat"
    - intent_type: system_help
      description: "帮助"
      target: "system"
    - intent_type: system_exit
      description: "退出"
      target: "system"
    - intent_type: system_confirm
      description: "确认"
      target: "system"
    - intent_type: system_cancel
      description: "取消"
      target: "system"

prompt:
  capability_template: "chat: 简单对话（闲聊、问候、简单问答，LLM 直接回答即可）"
  single_hint: ""
  multi_hint: ""
